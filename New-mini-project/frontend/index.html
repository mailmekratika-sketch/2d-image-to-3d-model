<!DOCTYPE html>
<html>
<head>
  <title>2D → 3D Converter</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 2rem; }
    canvas { border: 1px solid black; display: block; margin: 1rem auto; }
  </style>
</head>
<body>
  <h1>Upload a 2D Image</h1>
  <form id="uploadForm">
    <input type="file" name="image" required />
    <button type="submit">Upload</button>
  </form>

  <pre id="response"></pre>

  <h2>3D Model Preview</h2>
  <canvas id="threeCanvas" width="400" height="400"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.153.0/examples/js/loaders/OBJLoader.js"></script>
  <script src="script.js"></script>
</body>
</html>
